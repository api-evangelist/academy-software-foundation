description: ASWF projects are open source C++/Python libraries (OpenEXR, OpenVDB, OpenColorIO, OpenTimelineIO,
  Open Shading Language, MaterialX, OpenCue, OpenImageIO, OpenFX, OpenAPV, OpenPBR) consumed in-process
  rather than over an HTTP API. There are no published rate limits because there is no hosted API surface;
  consumption is bounded only by local compute and license terms (Apache 2.0 / BSD-3-Clause / MIT).
sources:
  - https://www.aswf.io/projects/
  - https://github.com/AcademySoftwareFoundation
notes: No HTTP API surface, no rate limits to capture. The only network-facing resources are GitHub repositories
  and project websites, which inherit GitHub / hosting platform rate limits rather than ASWF-published limits.
responseCodes: {}
limits: []
policies:
  - name: License Boundary
    description: Use is governed by per-project open source licenses (Apache 2.0 for most projects, BSD-3-Clause
      for OpenEXR/OpenColorIO, MIT for some tooling). There are no per-call quotas.
