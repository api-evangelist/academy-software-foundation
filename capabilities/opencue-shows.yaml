naftiko: 1.0.0-alpha2
info:
  label: Academy Software Foundation - OpenCue API — Shows
  description: 'Academy Software Foundation - OpenCue API — Shows. 1 operations. Lead operation: Academy Software Foundation
    List Shows. Self-contained Naftiko capability covering one Academy Software Foundation business surface.'
  tags:
  - Academy Software Foundation
  - Shows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACADEMY_SOFTWARE_FOUNDATION_API_KEY: ACADEMY_SOFTWARE_FOUNDATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: opencue-shows
    baseUri: http://localhost:8080
    description: Academy Software Foundation - OpenCue API — Shows business capability. Self-contained, no shared references.
    resources:
    - name: api-show
      path: /api/show
      operations:
      - name: listshows
        method: GET
        description: Academy Software Foundation List Shows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: opencue-shows-rest
    port: 8080
    description: REST adapter for Academy Software Foundation - OpenCue API — Shows. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/show
      name: api-show
      description: REST surface for api-show.
      operations:
      - method: GET
        name: listshows
        description: Academy Software Foundation List Shows
        call: opencue-shows.listshows
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: opencue-shows-mcp
    port: 9090
    transport: http
    description: MCP adapter for Academy Software Foundation - OpenCue API — Shows. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: academy-software-foundation-list-shows
      description: Academy Software Foundation List Shows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: opencue-shows.listshows
      outputParameters:
      - type: object
        mapping: $.
