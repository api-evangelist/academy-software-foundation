description: FOCUS-aligned FinOps scaffold for Academy Software Foundation. ASWF projects are free open
  source libraries; there are no provider invoices to allocate. FinOps relevance is internal — studios
  track CI/CD compute, storage, and developer time spent on ASWF integrations rather than vendor charges.
sources:
  - https://www.aswf.io/
  - https://www.aswf.io/membership/
notes: No vendor billing surface. The only direct ASWF cost is Linux Foundation membership (negotiated,
  not publicly metered). Internal FinOps focus is on the compute and storage costs studios incur when
  building, testing, and running ASWF-based pipelines — those costs land on the underlying cloud or on-prem
  provider, not ASWF.
