principles:
  - name: Visibility
    description: There is no ASWF invoice to track. Visibility means cataloging which ASWF libraries
      (OpenEXR, OpenVDB, OpenColorIO, etc.) are linked into internal pipelines, and the build/CI cost
      of maintaining those integrations.
  - name: Allocation
    description: Allocate the compute and storage cost of ASWF-dependent workloads (render farms, color
      pipelines, image conversion) to the consuming production or studio cost center.
  - name: Optimization
    description: Optimize through caching of build artifacts (aswf-docker images), pinning library versions,
      and choosing the right project for the workload (e.g. OpenImageIO vs custom image code).
  - name: Accountability
    description: Studio engineering leadership owns the build/CI cost; the LF membership line, where it
      exists, is owned by studio leadership or a consortium-relations function.
