description: The Academy Software Foundation is a Linux Foundation project that hosts production-proven
  open source projects (OpenEXR, OpenVDB, OpenColorIO, OpenTimelineIO, OpenShadingLanguage, MaterialX,
  OpenCue, OpenImageIO, OpenFX, OpenAPV, OpenPBR). The hosted projects are free open source software
  released under permissive licenses (Apache 2.0, BSD-3-Clause, MIT). There is no commercial API surface
  with metered pricing. Engagement is through Linux Foundation membership (Premier / General / Associate)
  rather than per-API plans.
sources:
  - https://www.aswf.io/
  - https://www.aswf.io/membership/
notes: No public commercial API pricing. ASWF projects are open source and free to use. Organizations
  participate via Linux Foundation membership tiers; membership fees are negotiated and not published as
  per-API plans. Reconciled flag set to false because there is no consumer pricing page to map to API
  Commons Plans entries.
