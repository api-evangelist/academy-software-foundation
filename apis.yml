aid: academy-software-foundation
name: Academy Software Foundation
description: >-
  The Academy Software Foundation (ASWF) is a Linux Foundation project that
  supports open source software development for the motion picture, visual
  effects, and animation industries. ASWF hosts a portfolio of production-proven
  open source projects including OpenEXR, OpenVDB, OpenColorIO, OpenTimelineIO,
  OpenShadingLanguage, MaterialX, and more. These projects form the backbone of
  modern film and media production pipelines worldwide.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Animation
- Color Management
- Film
- Linux Foundation
- Open Source
- Rendering
- Standards
- Visual Effects
- VFX
